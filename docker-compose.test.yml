version: '3'

services:

  test:
    image: enjaku/downtime_detector:latest
    depends_on:
      - db
    environment:
      - 'RAILS_ENV=test'
    command: bash -c "bundle exec rails db:test:prepare && bundle exec rspec -fp"

  db:
    image: postgres:12.2
    volumes:
      - ./tmp/db:/var/lib/postgresql/data
    environment:
      - 'POSTGRES_HOST_AUTH_METHOD=trust'
    ports:
      - '5432:5432'
