default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= 'db' %>
  username: postgres
  pool: <%= ENV.fetch('RAILS_MAX_THREADS') { 5 } %>

development:
  <<: *default
  database: downtime_detector_development

test:
  <<: *default
  database: downtime_detector_test

production:
  <<: *default
  database: downtime_detector_production
