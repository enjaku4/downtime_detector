name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      RAILS_ENV: test
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      DATABASE_HOST: localhost

    services:
      db:
        image: postgres:12.2
        ports:
          - 5432:5432
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-ruby@v1
        with:
          ruby-version: 2.6.6

      - run: sudo apt-get -yqq install libpq-dev
      - run: bundle config --local path vendor/bundle

      - uses: actions/cache@v2
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: ${{ runner.os }}-gems-

      - run: bundle
      - run: bin/rails db:test:prepare
      - run: bin/rspec --format RSpec::Github::Formatter

  build:
    runs-on: ubuntu-latest

    needs: test
    # TODO run on master branch only
    # if: github.ref == 'refs/heads/master'
    if: github.ref == 'refs/pull/9/merge'

    steps:
      # TODO some people don't use checkout which seems strange
      # - uses: actions/checkout@v2
      # TODO not sure if need this
      # - uses: docker/setup-qemu-action@v1
      # TODO not sure if need this either
      # - uses: docker/setup-buildx-action@v1

      - uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/app:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/app:latest
          build-args: |
            RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY }}
