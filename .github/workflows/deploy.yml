name: deploy

on:
  push:
    branches: [ master ]
  # TODO delete this when ready
  pull_request:
    branches: [ master ]

jobs:
  build:
    if: startsWith(github.sha, github.event.client_payload.text)

    runs-on: ubuntu-latest

    steps:
      - uses: lewagon/wait-on-check-action@v0.1
        with:
          ref: master
          check-name: test
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20

      - run: echo success!!!
